<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>Sign Up · Ancestral Roots Genealogy</title>
    <!-- Ancestral Roots favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%238B5E3C' d='M256 32c-14.8 0-26.7 12-26.7 26.7v26.7c0 14.7 11.9 26.7 26.7 26.7s26.7-12 26.7-26.7V58.7c0-14.7-11.9-26.7-26.7-26.7zm117.3 74.7c-10.4 0-18.8 8.4-18.8 18.8v18.8c0 10.4 8.4 18.8 18.8 18.8s18.8-8.4 18.8-18.8v-18.8c0-10.4-8.4-18.8-18.8-18.8zm-234.6 0c-10.4 0-18.8 8.4-18.8 18.8v18.8c0 10.4 8.4 18.8 18.8 18.8s18.8-8.4 18.8-18.8v-18.8c0-10.4-8.4-18.8-18.8-18.8zM256 128c-70.7 0-128 57.3-128 128s57.3 128 128 128 128-57.3 128-128-57.3-128-128-128zm0 213.3c-47.1 0-85.3-38.2-85.3-85.3s38.2-85.3 85.3-85.3 85.3 38.2 85.3 85.3-38.2 85.3-85.3 85.3z'/></svg>">

    <!-- Tailwind CSS -->
    <script src="tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'heritage-wood': '#8B5E3C',
                        'heritage-wood-light': '#B88A5E',
                        'heritage-wood-dark': '#5C3A21',
                        'heritage-parchment': '#F9F1E0',
                        'heritage-ink': '#2C2418',
                        'heritage-sepia': '#E8DCC8',
                        'heritage-gold': '#C6A43F',
                        'heritage-burgundy': '#6A2E35',
                    },
                    fontFamily: {
                        'serif': ['Cormorant Garamond', 'Georgia', 'serif'],
                        'heading': ['Playfair Display', 'serif'],
                        'body': ['Lato', 'system-ui', 'sans-serif'],
                        'script': ['Great Vibes', 'cursive'],
                        'alt-serif': ['Libre Baskerville', 'serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out',
                        'float': 'float 6s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&family=Lato:wght@300;400;700;900&family=Great+Vibes&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ----- NO SCROLL — fit exactly one screen ----- */
        html,
        body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #F9F1E0;
            color: #2C2418;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .dark body {
            background-color: #1E1B16;
            color: #E8DCC8;
        }

        /* toggle buttons — positioned top-right */
        .theme-toggle-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #E8DCC8;
            color: #8B5E3C;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .dark .toggle-btn {
            background: #2A241C;
            color: #C6A43F;
        }

        .toggle-btn:hover {
            background: #C6A43F;
            color: #1E1B16;
        }

        .dark .toggle-btn:hover {
            background: #C6A43F;
            color: #1E1B16;
        }

        .toggle-btn.active {
            background: #C6A43F;
            color: #1E1B16;
        }

        .dark .toggle-btn.active {
            background: #C6A43F;
            color: #1E1B16;
        }

        /* SIGNUP CARD — heritage theme */
        .signup-card {
            background: white;
            border-radius: 32px;
            padding: 1.5rem 1.8rem 1.8rem;
            box-shadow: 0 20px 40px rgba(139, 94, 60, 0.1);
            border: 1px solid rgba(198, 164, 63, 0.2);
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            transition: background 0.2s ease;
        }

        .dark .signup-card {
            background: #2A241C;
            border-color: #5C4A32;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }

        /* input — heritage style */
        .signup-input {
            width: 100%;
            padding: 0.7rem 1.2rem 0.7rem 3rem;
            border-radius: 50px;
            border: 1px solid #E8DCC8;
            background: white;
            font-size: 0.9rem;
            transition: all 0.2s;
            color: #2C2418;
        }

        .dark .signup-input {
            background: #1E1B16;
            border-color: #5C4A32;
            color: #E8DCC8;
        }

        .signup-input:focus {
            outline: none;
            border-color: #C6A43F;
            box-shadow: 0 0 0 3px rgba(198, 164, 63, 0.2);
        }

        .dark .signup-input:focus {
            border-color: #C6A43F;
            box-shadow: 0 0 0 3px rgba(198, 164, 63, 0.25);
        }

        /* password wrapper for eye icon */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper .signup-input {
            padding-right: 3rem;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8B5E3C;
            font-size: 0.95rem;
            transition: color 0.2s;
            background: transparent;
            border: none;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark .toggle-password {
            color: #C6A43F;
        }

        .toggle-password:hover {
            color: #C6A43F;
        }

        .dark .toggle-password:hover {
            color: #C6A43F;
        }

        [dir="rtl"] .toggle-password {
            right: auto;
            left: 1rem;
        }

        [dir="rtl"] .password-wrapper .signup-input {
            padding-right: 1.2rem;
            padding-left: 3rem;
        }

        [dir="rtl"] .input-icon {
            left: auto;
            right: 1.1rem;
        }

        /* heritage button */
        .heritage-btn {
            background: #8B5E3C;
            color: white;
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
        }

        .dark .heritage-btn {
            background: #C6A43F;
            color: #1E1B16;
        }

        .heritage-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(139, 94, 60, 0.3);
        }

        .dark .heritage-btn:hover {
            box-shadow: 0 6px 18px rgba(198, 164, 63, 0.35);
        }

        /* social login buttons */
        .social-btn-row {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            width: 100%;
            margin-top: 0.25rem;
        }

        .social-btn {
            flex: 1;
            padding: 0.6rem 0.5rem;
            border-radius: 50px;
            border: 1px solid #E8DCC8;
            background: white;
            color: #2C2418;
            font-weight: 500;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            gap: 0.5rem;
            cursor: pointer;
        }

        .dark .social-btn {
            background: #1E1B16;
            border-color: #5C4A32;
            color: #E8DCC8;
        }

        .social-btn:hover {
            background: #F9F1E0;
            border-color: #C6A43F;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .dark .social-btn:hover {
            background: #2A241C;
            border-color: #C6A43F;
        }

        .social-btn i {
            font-size: 1.1rem;
            color: #8B5E3C;
        }

        .dark .social-btn i {
            color: #C6A43F;
        }

        /* logo spin */
        .logo-icon {
            transition: transform 0.3s ease;
        }

        a:hover .logo-icon {
            transform: rotate(12deg);
        }

        /* RTL adjustments */
        [dir="rtl"] .signup-input {
            padding: 0.7rem 3rem 0.7rem 1.2rem;
        }

        [dir="rtl"] .input-icon {
            left: auto;
            right: 1.1rem;
        }

        [dir="rtl"] .fa-arrow-right {
            transform: scaleX(-1);
        }

        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 20px;
        }

        [dir="rtl"] .flex.space-x-2> :not([hidden])~ :not([hidden]) {
            margin-right: 0.5rem;
            margin-left: 0;
        }

        /* hidden utility */
        .hidden {
            display: none;
        }

        /* container */
        .container-tight {
            max-width: 480px;
            width: 100%;
            padding: 0 1.2rem;
        }

        /* center logo container */
        .logo-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.5rem;
        }

        /* heritage line */
        .heritage-line {
            width: 50px;
            height: 2px;
            background: #C6A43F;
            margin: 0.5rem auto;
        }

        /* welcome title styles */
        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #2C2418;
            margin-top: 0.5rem;
            margin-bottom: 0.1rem;
            text-align: center;
            line-height: 1.2;
        }

        .dark .welcome-title {
            color: white;
        }

        .welcome-subtitle {
            font-size: 0.8rem;
            color: rgba(44, 36, 24, 0.7);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .dark .welcome-subtitle {
            color: #9CA3AF;
        }

        /* terms text style */
        .terms-text {
            font-size: 0.7rem;
            color: #6B7280;
        }

        .dark .terms-text {
            color: #9CA3AF;
        }

        .terms-link {
            color: #C6A43F;
            font-weight: 500;
            text-decoration: none;
        }

        .terms-link:hover {
            text-decoration: underline;
            color: #8B5E3C;
        }

        .dark .terms-link {
            color: #C6A43F;
        }

        /* divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1rem 0 0.6rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #E8DCC8;
        }

        .dark .divider::before,
        .dark .divider::after {
            border-bottom-color: #5C4A32;
        }

        .divider span {
            font-size: 0.7rem;
            padding: 0 0.7rem;
            color: #6B7280;
            font-weight: 500;
        }

        .dark .divider span {
            color: #9CA3AF;
        }

        /* spacing adjustments */
        .space-y-4> :not([hidden])~ :not([hidden]) {
            margin-top: 0.75rem;
        }

        form .space-y-4 {
            margin-bottom: 0.25rem;
        }

        /* mobile friendly */
        @media (max-width: 380px) {
            .signup-card {
                padding: 1.2rem 1.2rem 1.5rem;
            }

            .welcome-title {
                font-size: 1.3rem;
            }

            .social-btn-row {
                gap: 0.75rem;
            }

            .social-btn {
                padding: 0.5rem 0.3rem;
                font-size: 0.8rem;
                gap: 0.4rem;
            }

            .social-btn i {
                font-size: 1rem;
            }

            .signup-input {
                padding: 0.6rem 1rem 0.6rem 2.8rem;
                font-size: 0.85rem;
            }

            .toggle-password {
                right: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .theme-toggle-wrapper {
                top: 12px;
                right: 12px;
            }

            [dir="rtl"] .theme-toggle-wrapper {
                left: 12px;
            }
        }
    </style>
</head>

<body class="bg-heritage-parchment dark:bg-dark-bg">

    <!-- ===== THEME TOGGLES - TOP-RIGHT ===== -->
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="toggle-btn" title="Dark / Light">
            <i class="fas fa-sun"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn" title="RTL / LTR">
            ⇄
        </button>
    </div>

    <!-- ===== SIGNUP CARD ===== -->
    <div class="container-tight">

        <!-- SIGNUP CARD -->
        <div class="signup-card animate-fade-in">

            <!-- ===== LOGO - CENTERED ===== -->
            <div class="logo-center">
                <a href="index.html" class="flex items-center space-x-3 group">
                    <div class="w-10 h-10 bg-[#8B5E3C] dark:bg-[#8B5E3C] flex items-center justify-center rounded-lg">
                        <i class="fas fa-dna text-white text-xl"></i>
                    </div>
                    <div>
                        <span class="text-2xl font-heading font-bold text-[#8B5E3C] dark:text-[#8B5E3C]">Ancestry</span>
                    </div>
                </a>


                <h6 class="welcome-title">Begin Your Journey</h6>
                <p class="welcome-subtitle">Create your account to start exploring your family history</p>
            </div>

            <!-- ===== SIGNUP FORM with EYE ICON on password fields ===== -->
            <form class="space-y-4"
                onsubmit="event.preventDefault(); alert('🎉 Welcome to Ancestral Roots! Your account has been created. (Demo)'); window.location.href='login.html';">

                <!-- full name field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-heritage-gold dark:text-heritage-gold input-icon">
                        <i class="fas fa-user w-4 text-sm"></i>
                    </span>
                    <input type="text" name="name" placeholder="Full name" required class="signup-input text-sm md:text-sm">
                </div>

                <!-- email field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-heritage-gold dark:text-heritage-gold input-icon">
                        <i class="fas fa-envelope w-4 text-sm"></i>
                    </span>
                    <input type="email" name="email" placeholder="Email address" required class="signup-input text-sm md:text-sm">
                </div>

                <!-- password field with eye icon -->
                <div class="password-wrapper">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-heritage-gold dark:text-heritage-gold input-icon">
                        <i class="fas fa-lock w-4 text-sm"></i>
                    </span>
                    <input type="password" id="signup-password" name="password" placeholder="Password" required class="signup-input text-sm md:text-sm">
                    <button type="button" class="toggle-password" data-target="signup-password" aria-label="Show password">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>

                <!-- confirm password field with eye icon -->
                <div class="password-wrapper">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-heritage-gold dark:text-heritage-gold input-icon">
                        <i class="fas fa-lock w-4 text-sm"></i>
                    </span>
                    <input type="password" id="signup-confirm-password" name="confirm_password" placeholder="Confirm password" required class="signup-input text-sm md:text-sm">
                    <button type="button" class="toggle-password" data-target="signup-confirm-password" aria-label="Show password">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>

                <!-- terms and conditions checkbox -->
                <div class="flex items-start space-x-2 rtl:space-x-reverse mt-1">
                    <input type="checkbox" id="terms" class="mt-0.5 rounded border-heritage-sepia dark:border-gray-600 text-heritage-gold focus:ring-heritage-gold/30 dark:bg-gray-700" required>
                    <label for="terms" class="terms-text text-xs text-heritage-ink/80 dark:text-gray-400">
                        I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
                    </label>
                </div>

                <!-- SIGN UP BUTTON -->
                <button type="submit" class="heritage-btn mt-1">
                    <i class="fas fa-user-plus mr-2 rtl:ml-2 rtl:mr-0"></i>
                    Create Account
                </button>
            </form>

            <!-- ===== Divider + Social Options (Google & Apple) ===== -->
            <div class="divider">
                <span>or sign up with</span>
            </div>

            <div class="social-btn-row">
                <button class="social-btn group" id="googleSignupBtn">
                    <i class="fab fa-google"></i>
                    <span>Google</span>
                </button>
                <button class="social-btn group" id="appleSignupBtn">
                    <i class="fab fa-apple"></i>
                    <span>Apple</span>
                </button>
            </div>

            <!-- ===== LOGIN LINK ===== -->
            <div class="mt-4 text-center">
                <span class="text-xs text-heritage-ink/80 dark:text-gray-400">Already have an account?</span>
                <a href="login.html" class="text-xs font-semibold text-heritage-gold dark:text-heritage-gold hover:text-heritage-wood ml-1 rtl:mr-1 hover:underline">
                    Sign in
                </a>
            </div>

        </div>
    </div>

    <!-- ===== DARK / LIGHT + RTL TOGGLE SCRIPT + EYE ICON FUNCTIONALITY ===== -->
    <script>
            (function () {
                // ---------- THEME ----------
                const themeToggle = document.getElementById('theme-toggle');

                function setTheme(isDark) {
                    if (isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }

                    const icon = themeToggle?.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-sun', 'fa-moon');
                        icon.classList.add(isDark ? 'fa-moon' : 'fa-sun');
                    }

                    if (isDark) {
                        themeToggle?.classList.add('active');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        themeToggle?.classList.remove('active');
                        localStorage.setItem('theme', 'light');
                    }
                }
                
                // Check for saved theme or system preference
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    setTheme(true);
                } else if (savedTheme === 'light') {
                    setTheme(false);
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setTheme(true);
                } else {
                    setTheme(false);
                }

                if (themeToggle) {
                    themeToggle.addEventListener('click', (e) => {
                        e.preventDefault();
                        setTheme(!document.documentElement.classList.contains('dark'));
                    });
                }

                // ---------- RTL ----------
                const rtlBtn = document.getElementById('rtl-toggle');
                function setRTL(isRTL) {
                    if (isRTL) {
                        document.documentElement.dir = 'rtl';
                        document.documentElement.lang = 'ar';
                        rtlBtn?.classList.add('active');
                        localStorage.setItem('dir', 'rtl');
                    } else {
                        document.documentElement.dir = 'ltr';
                        document.documentElement.lang = 'en';
                        rtlBtn?.classList.remove('active');
                        localStorage.setItem('dir', 'ltr');
                    }
                }
                const savedDir = localStorage.getItem('dir');
                savedDir === 'rtl' ? setRTL(true) : setRTL(false);

                if (rtlBtn) {
                    rtlBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        setRTL(document.documentElement.dir !== 'rtl');
                    });
                }

                // ---------- EYE ICON TOGGLE PASSWORD VISIBILITY ----------
                const toggleButtons = document.querySelectorAll('.toggle-password');
                toggleButtons.forEach(button => {
                    button.addEventListener('click', function (e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('data-target');
                        const passwordInput = document.getElementById(targetId);
                        if (passwordInput) {
                            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                            passwordInput.setAttribute('type', type);
                            // Toggle eye icon
                            const icon = this.querySelector('i');
                            if (icon) {
                                if (type === 'text') {
                                    icon.classList.remove('fa-eye-slash');
                                    icon.classList.add('fa-eye');
                                } else {
                                    icon.classList.remove('fa-eye');
                                    icon.classList.add('fa-eye-slash');
                                }
                            }
                        }
                    });
                });

                // ---------- SOCIAL BUTTONS (Google & Apple) interactive demo ----------
                const googleBtn = document.getElementById('googleSignupBtn');
                const appleBtn = document.getElementById('appleSignupBtn');

                if (googleBtn) {
                    googleBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('🌳 Google sign-up demo: In production, this would redirect to Google OAuth.');
                    });
                }
                if (appleBtn) {
                    appleBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('🍎 Apple sign-up demo: In production, this would initiate Apple ID authentication.');
                    });
                }

                // ---------- DEMO ALERTS (Terms & Privacy) ----------
                document.querySelectorAll('.terms-link').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('📜 Terms of Service & Privacy Policy demo - full legal document would be shown.');
                    });
                });

                // ---------- Password match hint on submit ----------
                const signupForm = document.querySelector('form');
                if (signupForm) {
                    signupForm.addEventListener('submit', function (e) {
                        const password = document.getElementById('signup-password')?.value;
                        const confirm = document.getElementById('signup-confirm-password')?.value;
                        const termsCheck = document.getElementById('terms');
                        if (password !== confirm) {
                            e.preventDefault();
                            alert('⚠️ Passwords do not match. Please re-enter your password.');
                            return false;
                        }
                        if (!termsCheck.checked) {
                            e.preventDefault();
                            alert('📜 Please accept the Terms of Service and Privacy Policy to continue.');
                            return false;
                        }
                        return true;
                    });
                }
            })();
    </script>
</body>

</html>
