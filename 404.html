    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Theme Toggle
            // Theme Toggle
            const themeBtn = document.getElementById('theme-toggle');
            const themeBtnMob = document.getElementById('theme-toggle-mobile');
            
            const updateThemeUI = (isDark) => {
                [themeBtn, themeBtnMob].forEach(b => {
                    if(b) {
                        const moon = b.querySelector('.fa-moon');
                        const sun = b.querySelector('.fa-sun');
                        if(moon && sun) {
                            if(isDark) { moon.classList.add('hidden'); sun.classList.remove('hidden'); }
                            else { moon.classList.remove('hidden'); sun.classList.add('hidden'); }
                        }
                        b.classList.toggle('active', isDark);
                    }
                });
            };

            const toggleTheme = () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateThemeUI(isDark);
            };

            if(themeBtn) themeBtn.addEventListener('click', toggleTheme);
            if(themeBtnMob) themeBtnMob.addEventListener('click', toggleTheme);
            
            if(localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                updateThemeUI(true);
            }
            
            // RTL Toggle
            const rtlBtn = document.getElementById('rtl-toggle');
            const rtlMob = document.getElementById('rtl-toggle-mobile');

            const updateRtlUI = (isRtl) => {
                const dir = isRtl ? 'rtl' : 'ltr';
                document.documentElement.dir = dir;
                document.documentElement.lang = isRtl ? 'ar' : 'en';
                [rtlBtn, rtlMob].forEach(b => b && b.classList.toggle('active', isRtl));
            };

            const toggleRtl = () => {
                const isRtl = document.documentElement.dir !== 'rtl';
                localStorage.setItem('dir', isRtl ? 'rtl' : 'ltr');
                updateRtlUI(isRtl);
            };

            if(rtlBtn) rtlBtn.addEventListener('click', toggleRtl);
            if(rtlMob) rtlMob.addEventListener('click', toggleRtl);

            if(localStorage.getItem('dir') === 'rtl') {
                updateRtlUI(true);
            }
        });
    </script>
